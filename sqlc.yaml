version: "2"
sql:
  - engine: "sqlite"
    queries: "internal/reposqlite/sql/queries.sql"
    schema: "internal/reposqlite/sql/schema.sql"
    gen:
      go:
        package: "db"
        out: "internal/reposqlite/db"
        emit_interface: false
        emit_json_tags: false
        emit_exact_table_names: false
