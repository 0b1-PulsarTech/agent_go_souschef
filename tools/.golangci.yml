version: "2"

linters:
  default: fast
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - cyclop
    - dupl
    - exptostd
    - funlen
    - goconst
    - godoclint
    - gosec
    - gosmopolitan
    - importas
    - interfacebloat
    - ireturn
    - modernize
    - nakedret
    - nestif
    - noctx
    - prealloc
    - predeclared
    - sloglint
    - tagalign
    - unconvert
    - unparam
    - whitespace
    - wrapcheck

  settings:
    nakedret:
      max-func-lines: 40
    funlen:
      lines: 80
      statements: 0
    cyclop:
      max-complexity: 15
    depguard:
      rules:
        main:
          allow:
            - $gostd
            - github.com/0b1-PulsarTech/agent_go_souschef
            - github.com/go-git/go-git/v5
            - github.com/modelcontextprotocol/go-sdk
            - github.com/wrapped-owls/goremy-di
            - golang.org/x/tools
            - modernc.org/sqlite

  exclusions:
    generated: strict
    warn-unused: true
    rules:
      - path: _test\.go
        linters:
          - gocyclo
          - errcheck
          - dupl
          - gosec
          - testpackage
          - goconst

      - path-except: _test\.go
        linters:
          - forbidigo

      - linters:
          - staticcheck
        text: "SA1029:"

      - linters:
          - lll
        source: "^//go:generate "

formatters:
  enable:
    - gofumpt
    - goimports
    - golines
  exclusions:
    warn-unused: true
    generated: strict

run:
  timeout: 5m
  modules-download-mode: readonly
